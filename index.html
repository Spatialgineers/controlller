<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGX Spatial Controller | Spatialgineers</title>
    
    <!-- Tailwind CSS para estilos rápidos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configuración de colores de la marca SGX -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sgxBlue: '#32527B',
                        sgxNeon: '#FDCC0D',
                        sgxCopper: '#B87333',
                        sgxDark: '#1a1a1a'
                    }
                }
            }
        }
    </script>

    <!-- Librerías Externas -->
    <!-- Three.js para el 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- PeerJS para conexión directa P2P -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <!-- QRCode.js para generar el código dinámico -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
        #qr-container { pointer-events: auto; }
        #controller-ui { width: 100vw; height: 100vh; display: none; }
    </style>
</head>
<body class="text-white">

    <!-- ========================================== -->
    <!-- INTERFAZ PANTALLA GIGANTE (VISUALIZADOR) -->
    <!-- ========================================== -->
    <div id="canvas-container"></div>
    <div id="ui-layer" class="flex flex-col justify-between p-8">
        <div class="flex justify-between items-start">
            <div>
                <h1 class="text-4xl font-bold text-sgxNeon tracking-widest uppercase">SPATIALGINEERS</h1>
                <p class="text-xl text-gray-400">SGX.Showcase | Spatial Controller</p>
            </div>
            <div id="connection-status" class="bg-gray-800 bg-opacity-70 px-4 py-2 rounded-full border border-gray-600 text-sm">
                Conectando al servidor PeerJS...
            </div>
        </div>
        
        <div class="flex justify-end items-end">
            <div class="bg-white p-4 rounded-xl shadow-2xl flex flex-col items-center" id="qr-container">
                <div id="qrcode" class="mb-2"></div>
                <p class="text-black font-bold text-sm text-center" id="qr-instruction">ESCANEA PARA<br>TOMAR EL CONTROL</p>
            </div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- INTERFAZ DEL CELULAR (CONTROLADOR)       -->
    <!-- ========================================== -->
    <div id="controller-ui" class="bg-sgxDark flex flex-col items-center justify-center p-6 text-center">
        <h2 class="text-3xl font-bold text-sgxNeon mb-2 tracking-widest uppercase">SGX REMOTE</h2>
        <p class="text-gray-400 mb-12">Tu teléfono es ahora un controlador espacial.</p>
        
        <div id="setup-section">
            <button id="btn-activar" class="bg-sgxNeon text-black font-bold text-xl py-6 px-10 rounded-2xl shadow-[0_0_20px_rgba(253,204,13,0.5)] transform transition active:scale-95">
                ACTIVAR SENSORES
            </button>
            <p id="debug-text" class="text-xs text-gray-500 mt-4 px-8 h-8">Requerido por iOS/Android para habilitar el giroscopio.</p>
        </div>

        <div id="active-section" class="hidden flex-col items-center w-full">
            <div class="w-32 h-32 rounded-full border-4 border-sgxNeon flex items-center justify-center mb-8 relative">
                <div class="absolute w-full h-full rounded-full border-t-4 border-sgxCopper animate-spin"></div>
                <span class="font-bold text-lg">EN LÍNEA</span>
            </div>
            
            <div class="grid grid-cols-3 gap-4 w-full max-w-sm mb-12">
                <div class="bg-gray-800 p-3 rounded-lg"><span class="text-xs text-gray-400 block">X (Pitch)</span><span id="val-x" class="font-mono text-sgxNeon">0</span></div>
                <div class="bg-gray-800 p-3 rounded-lg"><span class="text-xs text-gray-400 block">Y (Roll)</span><span id="val-y" class="font-mono text-sgxNeon">0</span></div>
                <div class="bg-gray-800 p-3 rounded-lg"><span class="text-xs text-gray-400 block">Z (Yaw)</span><span id="val-z" class="font-mono text-sgxNeon">0</span></div>
            </div>

            <button id="btn-recalibrar" class="bg-transparent border-2 border-sgxCopper text-sgxCopper font-bold py-3 px-8 rounded-full active:bg-sgxCopper active:text-white transition">
                RECALIBRAR CENTRO
            </button>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- LÓGICA DE LA APLICACIÓN (EL CEREBRO)     -->
    <!-- ========================================== -->
    <script>
        // Determinar en qué modo estamos basados en el URL
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('modo');
        const hostId = urlParams.get('id');

        // Referencias del DOM
        const uiDisplay = document.getElementById('ui-layer');
        const canvasContainer = document.getElementById('canvas-container');
        const uiController = document.getElementById('controller-ui');
        const statusDisplay = document.getElementById('connection-status');
        const debugText = document.getElementById('debug-text');

        let peer = null;
        let dataConnection = null;

        // Variables globales para calibración
        let offsetAlpha = 0;
        let offsetBeta = 0;
        let offsetGamma = 0;

        // ==========================================
        // MODO 1: PANTALLA GIGANTE (VISUALIZADOR 3D)
        // ==========================================
        if (mode !== 'controlador') {
            uiDisplay.style.display = 'flex';
            canvasContainer.style.display = 'block';

            // 1. Inicializar Three.js
            const scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.02);

            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 10;

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            canvasContainer.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0x32527B, 0.5); 
            scene.add(ambientLight);

            const neonLight = new THREE.DirectionalLight(0xFDCC0D, 1.5); 
            neonLight.position.set(5, 5, 5);
            scene.add(neonLight);

            const copperLight = new THREE.PointLight(0xB87333, 2); 
            copperLight.position.set(-5, -5, -5);
            scene.add(copperLight);

            const geometry = new THREE.TorusKnotGeometry(2, 0.6, 200, 32);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0x222222, 
                roughness: 0.2, 
                metalness: 0.8,
                wireframe: true 
            });
            const sgxObject = new THREE.Mesh(geometry, material);
            scene.add(sgxObject);

            let targetRotation = new THREE.Euler();
            
            function animate() {
                requestAnimationFrame(animate);
                
                if (!dataConnection) {
                    sgxObject.rotation.x += 0.005;
                    sgxObject.rotation.y += 0.005;
                } else {
                    sgxObject.rotation.x += (targetRotation.x - sgxObject.rotation.x) * 0.1;
                    sgxObject.rotation.y += (targetRotation.y - sgxObject.rotation.y) * 0.1;
                    sgxObject.rotation.z += (targetRotation.z - sgxObject.rotation.z) * 0.1;
                }

                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // 2. Inicializar PeerJS con debug y manejo de errores
            peer = new Peer({ debug: 2 }); 
            
            peer.on('open', (id) => {
                console.log('Visualizador ID listo:', id);
                statusDisplay.innerHTML = '<span class="text-yellow-400">Esperando conexión (Escanea el QR)...</span>';
                
                // Construir URL limpia sin hashes que puedan dañar el parámetro
                const currentUrl = window.location.href.split('?')[0].split('#')[0];
                const controllerUrl = `${currentUrl}?modo=controlador&id=${id}`;
                
                document.getElementById("qrcode").innerHTML = ""; // Limpiar por si acaso
                new QRCode(document.getElementById("qrcode"), {
                    text: controllerUrl,
                    width: 150,
                    height: 150,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.L
                });
            });

            peer.on('error', (err) => {
                statusDisplay.innerHTML = `<span class="text-red-500 font-bold">Error de red: ${err.type}</span>`;
            });

            peer.on('connection', (conn) => {
                statusDisplay.innerHTML = '<span class="text-green-400 font-bold">● Controlador Conectado</span>';
                document.getElementById('qr-instruction').innerText = "CONTROL EN USO";
                
                conn.on('open', () => {
                    dataConnection = conn;
                    targetRotation.set(0,0,0);
                });

                conn.on('data', (data) => {
                    if(data.type === 'orientation') {
                        const degToRad = Math.PI / 180;
                        targetRotation.x = data.beta * degToRad; 
                        targetRotation.y = data.gamma * degToRad; 
                        targetRotation.z = data.alpha * degToRad; 
                    }
                });

                conn.on('close', () => {
                    dataConnection = null;
                    statusDisplay.innerHTML = '<span class="text-yellow-400">Desconectado. Esperando...</span>';
                    document.getElementById('qr-instruction').innerHTML = "ESCANEA PARA<br>TOMAR EL CONTROL";
                });
            });
        } 
        
        // ==========================================
        // MODO 2: CELULAR (CONTROLADOR REMOTO)
        // ==========================================
        else if (mode === 'controlador' && hostId) {
            uiController.style.display = 'flex';

            const btnActivar = document.getElementById('btn-activar');
            const setupSection = document.getElementById('setup-section');
            const activeSection = document.getElementById('active-section');
            const valX = document.getElementById('val-x');
            const valY = document.getElementById('val-y');
            const valZ = document.getElementById('val-z');
            const btnRecalibrar = document.getElementById('btn-recalibrar');

            let lastOrientation = { alpha: 0, beta: 0, gamma: 0 };

            // Asegurarnos que la web está en HTTPS (Requisito estricto de iOS)
            if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost') {
                debugText.innerHTML = "<span class='text-red-500'>⚠️ ADVERTENCIA: iOS requiere HTTPS para usar los sensores.</span>";
            }

            btnActivar.addEventListener('click', () => {
                // Prevenir múltiples clics
                btnActivar.disabled = true;
                btnActivar.innerHTML = "SOLICITANDO PERMISOS...";

                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                        .then(permissionState => {
                            if (permissionState === 'granted') {
                                iniciarConexion();
                            } else {
                                alert("Permiso denegado. Recarga la página y acepta.");
                                btnActivar.disabled = false;
                                btnActivar.innerHTML = "ACTIVAR SENSORES";
                            }
                        })
                        .catch(err => {
                            alert("Error pidiendo permiso: " + err);
                            btnActivar.disabled = false;
                            btnActivar.innerHTML = "ACTIVAR SENSORES";
                        });
                } else {
                    // Dispositivos Android o navegadores sin la barrera de iOS 13+
                    iniciarConexion();
                }
            });

            function iniciarConexion() {
                debugText.innerText = "Conectando al servidor P2P...";
                btnActivar.innerHTML = "CONECTANDO AL HOST...";

                peer = new Peer({ debug: 2 });
                
                peer.on('open', () => {
                    debugText.innerText = "Conectando a la pantalla gigante...";
                    
                    // Conectar en modo 'reliable: false' (UDP) para transmitir data continua sin que el buffer se ahogue
                    dataConnection = peer.connect(hostId, { reliable: false });
                    
                    dataConnection.on('open', () => {
                        setupSection.style.display = 'none';
                        activeSection.style.display = 'flex';
                        
                        // Añadimos el listener de sensores una vez la conexión P2P está abierta
                        window.addEventListener('deviceorientation', handleOrientation);
                    });

                    dataConnection.on('error', (err) => {
                        alert("Error de conexión de datos: " + err);
                        resetButton();
                    });
                });
                
                peer.on('error', (err) => {
                    alert("Error en PeerJS (Revisa el Wi-Fi): " + err.type);
                    resetButton();
                });
            }

            function resetButton() {
                btnActivar.disabled = false;
                btnActivar.innerHTML = "REINTENTAR CONEXIÓN";
                debugText.innerText = "Fallo en la conexión. Intenta de nuevo.";
            }

            function handleOrientation(event) {
                // Algunos dispositivos envían null mientras inicializan el magnetómetro
                let rawAlpha = event.alpha || 0;
                let rawBeta = event.beta || 0;
                let rawGamma = event.gamma || 0;

                let a = rawAlpha - offsetAlpha;
                let b = rawBeta - offsetBeta;
                let c = rawGamma - offsetGamma;

                lastOrientation = { alpha: rawAlpha, beta: rawBeta, gamma: rawGamma };

                valX.innerText = b.toFixed(0);
                valY.innerText = c.toFixed(0);
                valZ.innerText = a.toFixed(0);

                if (dataConnection && dataConnection.open) {
                    dataConnection.send({
                        type: 'orientation',
                        alpha: a,
                        beta: b,
                        gamma: c
                    });
                }
            }

            btnRecalibrar.addEventListener('click', () => {
                offsetAlpha = lastOrientation.alpha;
                offsetBeta = lastOrientation.beta;
                offsetGamma = lastOrientation.gamma;
                
                if(navigator.vibrate) navigator.vibrate(50);
            });
        }
        else {
            document.body.innerHTML = "<h1 class='text-white p-10'>Error: URL inválido. Falta el ID.</h1>";
        }
    </script>
</body>
</html>
