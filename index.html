<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGX Spatial Controller | Spatialgineers</title>
    
    <!-- Tailwind CSS para estilos rápidos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configuración de colores de la marca SGX -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sgxBlue: '#32527B',
                        sgxNeon: '#FDCC0D',
                        sgxCopper: '#B87333',
                        sgxDark: '#1a1a1a'
                    }
                }
            }
        }
    </script>

    <!-- Librerías Externas -->
    <!-- Three.js para el 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- PeerJS para conexión directa P2P (Sin backend) -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <!-- QRCode.js para generar el código dinámico -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
        #qr-container { pointer-events: auto; }
        #controller-ui { width: 100vw; height: 100vh; display: none; }
    </style>
</head>
<body class="text-white">

    <!-- ========================================== -->
    <!-- INTERFAZ PANTALLA GIGANTE (VISUALIZADOR) -->
    <!-- ========================================== -->
    <div id="canvas-container"></div>
    <div id="ui-layer" class="flex flex-col justify-between p-8">
        <div class="flex justify-between items-start">
            <div>
                <h1 class="text-4xl font-bold text-sgxNeon tracking-widest uppercase">SPATIALGINEERS</h1>
                <p class="text-xl text-gray-400">SGX.Showcase | Spatial Controller</p>
            </div>
            <div id="connection-status" class="bg-gray-800 bg-opacity-70 px-4 py-2 rounded-full border border-gray-600 text-sm">
                Esperando conexión...
            </div>
        </div>
        
        <div class="flex justify-end items-end">
            <div class="bg-white p-4 rounded-xl shadow-2xl flex flex-col items-center" id="qr-container">
                <div id="qrcode" class="mb-2"></div>
                <p class="text-black font-bold text-sm text-center">ESCANEA PARA<br>TOMAR EL CONTROL</p>
            </div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- INTERFAZ DEL CELULAR (CONTROLADOR)       -->
    <!-- ========================================== -->
    <div id="controller-ui" class="bg-sgxDark flex flex-col items-center justify-center p-6 text-center">
        <h2 class="text-3xl font-bold text-sgxNeon mb-2 tracking-widest uppercase">SGX REMOTE</h2>
        <p class="text-gray-400 mb-12">Tu teléfono es ahora un controlador espacial.</p>
        
        <div id="setup-section">
            <button id="btn-activar" class="bg-sgxNeon text-black font-bold text-xl py-6 px-10 rounded-2xl shadow-[0_0_20px_rgba(253,204,13,0.5)] transform transition active:scale-95">
                ACTIVAR SENSORES
            </button>
            <p class="text-xs text-gray-500 mt-4 px-8">Requerido por iOS/Android para habilitar el giroscopio.</p>
        </div>

        <div id="active-section" class="hidden flex-col items-center w-full">
            <div class="w-32 h-32 rounded-full border-4 border-sgxNeon flex items-center justify-center mb-8 relative">
                <div class="absolute w-full h-full rounded-full border-t-4 border-sgxCopper animate-spin"></div>
                <span class="font-bold text-lg">EN LÍNEA</span>
            </div>
            
            <div class="grid grid-cols-3 gap-4 w-full max-w-sm mb-12">
                <div class="bg-gray-800 p-3 rounded-lg"><span class="text-xs text-gray-400 block">X (Pitch)</span><span id="val-x" class="font-mono text-sgxNeon">0</span></div>
                <div class="bg-gray-800 p-3 rounded-lg"><span class="text-xs text-gray-400 block">Y (Roll)</span><span id="val-y" class="font-mono text-sgxNeon">0</span></div>
                <div class="bg-gray-800 p-3 rounded-lg"><span class="text-xs text-gray-400 block">Z (Yaw)</span><span id="val-z" class="font-mono text-sgxNeon">0</span></div>
            </div>

            <button id="btn-recalibrar" class="bg-transparent border-2 border-sgxCopper text-sgxCopper font-bold py-3 px-8 rounded-full active:bg-sgxCopper active:text-white transition">
                RECALIBRAR CENTRO
            </button>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- LÓGICA DE LA APLICACIÓN (EL CEREBRO)     -->
    <!-- ========================================== -->
    <script>
        // Determinar en qué modo estamos basados en el URL
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('modo');
        const hostId = urlParams.get('id');

        // Referencias del DOM
        const uiDisplay = document.getElementById('ui-layer');
        const canvasContainer = document.getElementById('canvas-container');
        const uiController = document.getElementById('controller-ui');
        const statusDisplay = document.getElementById('connection-status');

        // Sistema PeerJS para conexión directa P2P
        let peer = null;
        let dataConnection = null;

        // Variables globales para calibración
        let offsetAlpha = 0;
        let offsetBeta = 0;
        let offsetGamma = 0;

        // ==========================================
        // MODO 1: PANTALLA GIGANTE (VISUALIZADOR 3D)
        // ==========================================
        if (mode !== 'controlador') {
            uiDisplay.style.display = 'flex';
            canvasContainer.style.display = 'block';

            // 1. Inicializar Three.js
            const scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.02); // SGX Void

            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 10;

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            canvasContainer.appendChild(renderer.domElement);

            // Iluminación marca Spatialgineers
            const ambientLight = new THREE.AmbientLight(0x32527B, 0.5); // Azul Metálico base
            scene.add(ambientLight);

            const neonLight = new THREE.DirectionalLight(0xFDCC0D, 1.5); // Neón Amarillo
            neonLight.position.set(5, 5, 5);
            scene.add(neonLight);

            const copperLight = new THREE.PointLight(0xB87333, 2); // Cobre desde abajo
            copperLight.position.set(-5, -5, -5);
            scene.add(copperLight);

            // Objeto 3D de prueba (TorusKnot complejo para ver bien las rotaciones)
            // Aquí en el futuro cargarás tu archivo .GLB con GLTFLoader
            const geometry = new THREE.TorusKnotGeometry(2, 0.6, 200, 32);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0x222222, 
                roughness: 0.2, 
                metalness: 0.8,
                wireframe: true // Estilo de ingeniería
            });
            const sgxObject = new THREE.Mesh(geometry, material);
            scene.add(sgxObject);

            // Variables para suavizar la rotación (Lerp)
            let targetRotation = new THREE.Euler();
            
            // Loop de Renderizado
            function animate() {
                requestAnimationFrame(animate);
                
                // Si no hay controlador conectado, rotar lentamente de forma automática
                if (!dataConnection) {
                    sgxObject.rotation.x += 0.005;
                    sgxObject.rotation.y += 0.005;
                } else {
                    // Interpolación lineal suave para evitar brincos bruscos
                    sgxObject.rotation.x += (targetRotation.x - sgxObject.rotation.x) * 0.1;
                    sgxObject.rotation.y += (targetRotation.y - sgxObject.rotation.y) * 0.1;
                    sgxObject.rotation.z += (targetRotation.z - sgxObject.rotation.z) * 0.1;
                }

                renderer.render(scene, camera);
            }
            animate();

            // Adaptar si cambian el tamaño de la ventana
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // 2. Inicializar PeerJS (El Servidor Cliente)
            peer = new Peer(); // Genera un ID aleatorio automáticamente
            
            peer.on('open', (id) => {
                console.log('Visualizador ID:', id);
                
                // Construir la URL para el controlador
                // Usa la ruta actual pero le añade los parámetros
                const currentUrl = window.location.href.split('?')[0];
                const controllerUrl = `${currentUrl}?modo=controlador&id=${id}`;
                
                // Generar Código QR
                new QRCode(document.getElementById("qrcode"), {
                    text: controllerUrl,
                    width: 150,
                    height: 150,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.L
                });
            });

            // Escuchar si alguien se conecta
            peer.on('connection', (conn) => {
                dataConnection = conn;
                statusDisplay.innerHTML = '<span class="text-green-400 font-bold">● Controlador Conectado</span>';
                
                // Resetear rotación del objeto
                targetRotation.set(0,0,0);

                // Escuchar datos del celular
                conn.on('data', (data) => {
                    if(data.type === 'orientation') {
                        // Mapear los grados a Radianes para Three.js
                        // Dependiendo de cómo se sujete el teléfono, los ejes pueden variar.
                        // Esta es una configuración estándar vertical.
                        const degToRad = Math.PI / 180;
                        targetRotation.x = data.beta * degToRad; // Pitch (Adelante/Atras)
                        targetRotation.y = data.gamma * degToRad; // Roll (Lados)
                        targetRotation.z = data.alpha * degToRad; // Yaw (Brújula)
                    }
                });

                conn.on('close', () => {
                    dataConnection = null;
                    statusDisplay.innerHTML = '<span class="text-red-400">Desconectado. Esperando...</span>';
                });
            });
        } 
        
        // ==========================================
        // MODO 2: CELULAR (CONTROLADOR REMOTO)
        // ==========================================
        else if (mode === 'controlador' && hostId) {
            uiController.style.display = 'flex';

            const btnActivar = document.getElementById('btn-activar');
            const setupSection = document.getElementById('setup-section');
            const activeSection = document.getElementById('active-section');
            const valX = document.getElementById('val-x');
            const valY = document.getElementById('val-y');
            const valZ = document.getElementById('val-z');
            const btnRecalibrar = document.getElementById('btn-recalibrar');

            let lastOrientation = { alpha: 0, beta: 0, gamma: 0 };

            btnActivar.addEventListener('click', () => {
                // Solicitar permisos obligatorios en iOS 13+
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                        .then(permissionState => {
                            if (permissionState === 'granted') {
                                iniciarConexion();
                            } else {
                                alert("Permiso denegado. No podemos usar los sensores.");
                            }
                        })
                        .catch(console.error);
                } else {
                    // Para Android o navegadores antiguos
                    iniciarConexion();
                }
            });

            function iniciarConexion() {
                // Inicializar PeerJS en el celular
                peer = new Peer();
                
                peer.on('open', () => {
                    // Conectarse a la pantalla gigante
                    dataConnection = peer.connect(hostId);
                    
                    dataConnection.on('open', () => {
                        setupSection.style.display = 'none';
                        activeSection.style.display = 'flex';
                        
                        // Iniciar lectura de sensores
                        window.addEventListener('deviceorientation', handleOrientation);
                    });
                });
                
                peer.on('error', (err) => {
                    alert("Error conectando a la pantalla: " + err.type);
                });
            }

            function handleOrientation(event) {
                // Prevenir enviar nulos si el dispositivo no tiene sensor
                if (event.alpha === null) return;

                // Aplicar offset (calibración)
                let a = event.alpha - offsetAlpha;
                let b = event.beta - offsetBeta;
                let c = event.gamma - offsetGamma;

                // Guardar para la UI
                lastOrientation = { alpha: event.alpha, beta: event.beta, gamma: event.gamma };

                // Actualizar interfaz del celular (redondeado)
                valX.innerText = b.toFixed(0);
                valY.innerText = c.toFixed(0);
                valZ.innerText = a.toFixed(0);

                // Enviar a la pantalla gigante
                if (dataConnection && dataConnection.open) {
                    dataConnection.send({
                        type: 'orientation',
                        alpha: a,
                        beta: b,
                        gamma: c
                    });
                }
            }

            // Botón para recalibrar el centro ("mirar al frente")
            btnRecalibrar.addEventListener('click', () => {
                offsetAlpha = lastOrientation.alpha;
                offsetBeta = lastOrientation.beta;
                offsetGamma = lastOrientation.gamma;
                
                // Pequeña vibración como feedback (si el dispositivo lo soporta)
                if(navigator.vibrate) navigator.vibrate(50);
            });
        }
        else {
            document.body.innerHTML = "<h1 class='text-white p-10'>Error: URL inválido.</h1>";
        }
    </script>
</body>
</html>
